<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅遊行程規劃</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#748CAB',
              dark: '#3E5C76',
              light: '#E6EBEF',
              bg: '#F2F5F8',
              card: '#FFFFFF',
              textMain: '#2C3E50',
              textSub: '#8796A5'
            }
          }
        }
      }
    }
  </script>

  <style>
    /* 隱藏捲軸 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 確保輸入時間的icon可點擊 */
    input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    
    /* 底部抽屜動畫 */
    .bottom-sheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .bottom-sheet.open { transform: translateY(0); }
    .bottom-sheet.closed { transform: translateY(100%); }
    
    /* 背景遮罩動畫 */
    .overlay { transition: opacity 0.3s ease; }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .overlay.closed { opacity: 0; pointer-events: none; }
    
    /* 避免 iOS Safari 輸入時縮放 */
    input, textarea { font-size: 16px !important; }
  </style>
</head>
<body class="bg-brand-bg text-brand-textMain font-sans antialiased overflow-hidden">

  <!-- APP 容器 (模擬手機版面) -->
  <div id="app" class="max-w-md mx-auto h-[100dvh] bg-brand-bg shadow-xl relative flex flex-col">
    
    <!-- HEADER -->
    <header class="bg-brand-bg pt-12 pb-4 px-6 shrink-0 flex justify-between items-end border-b border-brand-light z-10">
      <div>
        <p id="header-subtitle" class="text-sm font-bold text-brand-primary mb-1">My Trip</p>
        <h1 id="header-title" class="text-3xl font-extrabold text-brand-dark tracking-tight">行程設定</h1>
      </div>
      <button id="btn-settings" class="hidden w-10 h-10 flex items-center justify-center bg-brand-card border border-brand-light shadow-sm rounded-full text-brand-textSub hover:text-brand-primary active:scale-95 transition-all">
        <i class="fa-solid fa-gear text-lg"></i>
      </button>
    </header>

    <!-- VIEW: SETUP (行程設定) -->
    <div id="view-setup" class="flex-1 overflow-y-auto px-6 pb-12">
      <form id="form-setup" class="space-y-5 mt-6">
        <div class="bg-brand-card p-5 rounded-[20px] border border-brand-light shadow-[0_2px_10px_rgba(44,62,80,0.03)]">
          <label class="block text-xs font-bold text-brand-textSub mb-2 uppercase tracking-wider">行程名稱</label>
          <input type="text" id="setup-title" placeholder="例：東京五日遊" required
            class="w-full text-xl font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/50">
        </div>
        <div class="flex gap-4">
          <div class="bg-brand-card p-5 rounded-[20px] border border-brand-light shadow-[0_2px_10px_rgba(44,62,80,0.03)] flex-1">
            <label class="block text-xs font-bold text-brand-textSub mb-2 uppercase tracking-wider">出發日期</label>
            <input type="date" id="setup-start-date" class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent">
          </div>
          <div class="bg-brand-card p-5 rounded-[20px] border border-brand-light shadow-[0_2px_10px_rgba(44,62,80,0.03)] w-28">
            <label class="block text-xs font-bold text-brand-textSub mb-2 uppercase tracking-wider">天數</label>
            <input type="number" id="setup-days" min="1" max="30" value="3" required
              class="w-full text-xl font-bold text-brand-textMain outline-none bg-transparent">
          </div>
        </div>
        <div class="bg-brand-card p-5 rounded-[20px] border border-brand-light shadow-[0_2px_10px_rgba(44,62,80,0.03)]">
          <label class="block text-xs font-bold text-brand-textSub mb-2 uppercase tracking-wider">住宿地點 (選填)</label>
          <input type="text" id="setup-accommodation" placeholder="例：新宿格拉斯麗飯店"
            class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/50">
        </div>

        <button type="submit" class="w-full bg-brand-primary text-brand-card font-bold text-lg py-4 rounded-[20px] shadow-lg shadow-brand-primary/20 hover:bg-brand-dark active:scale-[0.98] transition-all mt-8 flex justify-center items-center gap-2">
          <i class="fa-solid fa-circle-check text-xl"></i> 儲存並開始規劃
        </button>
      </form>
    </div>

    <!-- VIEW: ITINERARY (行程表) -->
    <div id="view-itinerary" class="hidden flex-1 flex flex-col h-full overflow-hidden bg-brand-bg relative">
      <!-- Days Tabs -->
      <div class="px-6 py-3 shrink-0 border-b border-brand-light bg-brand-bg z-10">
        <div id="days-tabs" class="flex overflow-x-auto gap-3 snap-x hide-scrollbar pb-1">
          <!-- 動態生成 Day 按鈕 -->
        </div>
      </div>

      <!-- Timeline -->
      <div id="timeline-container" class="flex-1 overflow-y-auto px-4 pb-32 pt-6 relative bg-brand-card rounded-t-[32px] mx-2 mt-2 shadow-[0_-4px_20px_rgba(44,62,80,0.03)] border border-brand-light border-b-0">
        <!-- 動態生成行程項目 -->
      </div>

      <!-- Floating Action Buttons -->
      <div class="absolute bottom-6 inset-x-0 px-6 flex justify-end gap-3 z-20 pointer-events-none">
        <button id="btn-add-location" class="pointer-events-auto flex items-center justify-center gap-2 bg-brand-dark text-brand-card font-bold h-14 px-6 rounded-full shadow-lg shadow-brand-dark/20 active:scale-95 transition-all">
          <i class="fa-solid fa-location-dot"></i> <span class="text-sm">地點</span>
        </button>
        <button id="btn-add-transport" class="pointer-events-auto flex items-center justify-center gap-2 bg-brand-primary text-brand-card font-bold h-14 px-6 rounded-full shadow-lg shadow-brand-primary/30 active:scale-95 transition-all">
          <i class="fa-solid fa-train"></i> <span class="text-sm">交通</span>
        </button>
      </div>
    </div>

  </div> <!-- End App -->

  <!-- ================= MODALS ================= -->

  <!-- Background Overlay -->
  <div id="modal-overlay" class="overlay closed fixed inset-0 z-[50] bg-brand-textMain/40 backdrop-blur-[2px]"></div>

  <!-- Form Bottom Sheet (Add/Edit) -->
  <div id="sheet-form" class="bottom-sheet closed fixed inset-x-0 bottom-0 z-[51] flex flex-col justify-end pointer-events-none">
    <div class="pointer-events-auto relative bg-brand-card w-full max-w-md mx-auto rounded-t-[32px] shadow-2xl flex flex-col max-h-[90vh]">
      <div class="w-12 h-1.5 bg-brand-light rounded-full mx-auto mt-4 mb-2"></div>
      <div class="px-6 py-4 flex justify-between items-center shrink-0">
        <h3 id="form-modal-title" class="text-xl font-bold text-brand-dark">新增項目</h3>
        <button class="btn-close-modal w-8 h-8 flex items-center justify-center bg-brand-bg rounded-full text-brand-textSub hover:text-brand-textMain transition-colors">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      
      <div class="px-6 pb-8 overflow-y-auto hide-scrollbar space-y-4">
        
        <!-- 共用：時間 -->
        <div class="bg-brand-bg p-4 rounded-[16px] border border-brand-light">
          <label id="label-time" class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">時間 <span class="text-brand-primary">*</span></label>
          <input type="time" id="input-time" required class="w-full text-2xl font-bold text-brand-textMain outline-none bg-transparent">
        </div>

        <!-- 交通專屬：交通工具選擇 -->
        <div id="group-transport-mode" class="hidden bg-brand-bg p-4 rounded-[16px] border border-brand-light">
          <label class="block text-xs font-bold text-brand-textSub mb-3 uppercase tracking-wider">交通工具</label>
          <div id="transport-modes-grid" class="grid grid-cols-3 gap-2">
            <!-- JS動態生成 -->
          </div>
        </div>

        <!-- 共用：名稱 -->
        <div class="bg-brand-bg p-4 rounded-[16px] border border-brand-light">
          <label id="label-name" class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">名稱 <span class="text-brand-primary">*</span></label>
          <input type="text" id="input-name" placeholder="" class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/60">
        </div>

        <!-- 地點專屬：備註 -->
        <div id="group-location-subtitle" class="hidden bg-brand-bg p-4 rounded-[16px] border border-brand-light">
          <label class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">備註</label>
          <input type="text" id="input-subtitle" placeholder="例：第二航廈" class="w-full text-base font-bold text-brand-primary outline-none bg-transparent placeholder-brand-textSub/60">
        </div>

        <!-- 交通專屬：花費時間與站數 -->
        <div id="group-transport-details" class="hidden flex gap-3">
          <div class="bg-brand-bg p-4 rounded-[16px] border border-brand-light flex-1">
            <label class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">花費時間</label>
            <input type="text" id="input-duration" placeholder="例：40分" class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/60">
          </div>
          <div class="bg-brand-bg p-4 rounded-[16px] border border-brand-light flex-1">
            <label class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">經過站數</label>
            <input type="text" id="input-extraInfo" placeholder="例：2站" class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/60">
          </div>
        </div>

        <!-- 交通專屬：費用 -->
        <div id="group-transport-cost" class="hidden bg-brand-bg p-4 rounded-[16px] border border-brand-light">
          <label class="block text-xs font-bold text-brand-textSub mb-1 uppercase tracking-wider">費用</label>
          <input type="text" id="input-cost" placeholder="例：¥2,570" class="w-full text-lg font-bold text-brand-textMain outline-none bg-transparent placeholder-brand-textSub/60">
        </div>
        
        <button id="btn-save-item" class="w-full bg-brand-primary text-brand-card font-bold text-lg py-4 rounded-[16px] shadow-lg shadow-brand-primary/20 mt-6 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none">
          確定儲存
        </button>
      </div>
    </div>
  </div>

  <!-- Options Bottom Sheet (Edit/Delete Selector) -->
  <div id="sheet-options" class="bottom-sheet closed fixed inset-x-0 bottom-0 z-[52] flex flex-col justify-end pointer-events-none">
    <div class="pointer-events-auto relative bg-brand-card w-full max-w-md mx-auto rounded-t-[32px] shadow-2xl flex flex-col">
      <div class="w-12 h-1.5 bg-brand-light rounded-full mx-auto mt-4 mb-2"></div>
      <div class="px-6 py-4 flex justify-between items-center shrink-0 border-b border-brand-light/50">
        <h3 class="text-xl font-bold text-brand-dark">選項</h3>
        <button class="btn-close-modal w-8 h-8 flex items-center justify-center bg-brand-bg rounded-full text-brand-textSub hover:text-brand-textMain transition-colors">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      <div class="px-6 py-6 space-y-3">
        <button id="btn-option-edit" class="w-full bg-brand-bg text-brand-dark font-bold text-lg py-4 rounded-[16px] flex justify-center items-center gap-2 hover:bg-brand-light transition-colors">
          <i class="fa-solid fa-pen"></i> 編輯此項目
        </button>
        <button id="btn-option-delete" class="w-full bg-[#FFE5E5] text-[#E63946] font-bold text-lg py-4 rounded-[16px] flex justify-center items-center gap-2 hover:bg-[#FFD1D1] transition-colors">
          <i class="fa-solid fa-trash-can"></i> 刪除此項目
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Dialog -->
  <div id="modal-delete" class="overlay closed fixed inset-0 z-[60] flex items-center justify-center px-6">
    <div class="absolute inset-0 bg-brand-textMain/60 backdrop-blur-sm btn-close-modal"></div>
    <div class="relative bg-brand-card border border-brand-light rounded-[24px] p-8 w-full max-w-sm shadow-2xl transition-transform transform scale-95 opacity-0" id="delete-dialog-content">
      <div class="w-16 h-16 bg-[#FFE5E5] rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-trash-can text-2xl text-[#E63946]"></i>
      </div>
      <h3 class="text-xl font-bold text-brand-textMain text-center mb-2">確認刪除</h3>
      <p class="text-brand-textSub text-center mb-8 text-sm">刪除後將無法還原，確定要繼續嗎？</p>
      <div class="flex gap-4">
        <button id="btn-cancel-delete" class="btn-close-modal flex-1 py-3.5 bg-brand-bg text-brand-dark font-bold rounded-[16px] hover:bg-brand-light transition-colors">取消</button>
        <button id="btn-confirm-delete" class="flex-1 py-3.5 bg-[#E63946] text-brand-card font-bold rounded-[16px] shadow-lg shadow-[#E63946]/20 active:scale-95 transition-all">確認刪除</button>
      </div>
    </div>
  </div>

  <script>
    // --- Constants ---
    const STORAGE_KEY = 'trip_itinerary_brand_html_v1';
    const TRANSPORT_MODES = [
      { id: 'train', label: '電車', icon: 'fa-solid fa-train' },
      { id: 'bus', label: '公車', icon: 'fa-solid fa-bus' },
      { id: 'car', label: '開車', icon: 'fa-solid fa-car' },
      { id: 'taxi', label: '計程車', icon: 'fa-solid fa-taxi' },
      { id: 'charter', label: '包車', icon: 'fa-solid fa-van-shuttle' },
      { id: 'walk', label: '步行', icon: 'fa-solid fa-person-walking' },
    ];

    // --- State ---
    let state = {
      activeTab: 'setup', 
      activeDay: 1,
      tripData: { title: '', startDate: '', days: 3, accommodation: '', itinerary: {} },
      
      // Form State
      modalMode: null, // 'form' | 'options' | 'delete' | null
      itemType: 'location', // 'location' | 'transport'
      editingId: null,
      formData: { time: '', name: '', subtitle: '', mode: 'train', duration: '', extraInfo: '', cost: '' }
    };

    // --- DOM Elements ---
    const els = {
      viewSetup: document.getElementById('view-setup'),
      viewItinerary: document.getElementById('view-itinerary'),
      headerTitle: document.getElementById('header-title'),
      headerSubtitle: document.getElementById('header-subtitle'),
      btnSettings: document.getElementById('btn-settings'),
      daysTabs: document.getElementById('days-tabs'),
      timelineContainer: document.getElementById('timeline-container'),
      
      // Setup Form
      formSetup: document.getElementById('form-setup'),
      setupTitle: document.getElementById('setup-title'),
      setupStartDate: document.getElementById('setup-start-date'),
      setupDays: document.getElementById('setup-days'),
      setupAcc: document.getElementById('setup-accommodation'),
      
      // Modals
      overlay: document.getElementById('modal-overlay'),
      sheetForm: document.getElementById('sheet-form'),
      sheetOptions: document.getElementById('sheet-options'),
      modalDelete: document.getElementById('modal-delete'),
      dialogContent: document.getElementById('delete-dialog-content'),
      
      // Form Inputs
      formTitle: document.getElementById('form-modal-title'),
      inputTime: document.getElementById('input-time'),
      inputName: document.getElementById('input-name'),
      inputSubtitle: document.getElementById('input-subtitle'),
      inputDuration: document.getElementById('input-duration'),
      inputExtra: document.getElementById('input-extraInfo'),
      inputCost: document.getElementById('input-cost'),
      btnSaveItem: document.getElementById('btn-save-item'),
      
      // Input Groups (for toggling visibility)
      groupMode: document.getElementById('group-transport-mode'),
      groupSub: document.getElementById('group-location-subtitle'),
      groupDetails: document.getElementById('group-transport-details'),
      groupCost: document.getElementById('group-transport-cost'),
      labelTime: document.getElementById('label-time'),
      labelName: document.getElementById('label-name'),
      transportModesGrid: document.getElementById('transport-modes-grid')
    };

    // --- Init ---
    function init() {
      loadData();
      setupEventListeners();
      renderApp();
    }

    // --- Storage ---
    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          state.tripData = JSON.parse(saved);
          if (state.tripData.title) state.activeTab = 'itinerary';
        }
      } catch (e) { console.error("Load error:", e); }
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tripData));
      } catch (e) { alert("儲存失敗，請確認瀏覽器空間"); }
    }

    // --- Renders ---
    function renderApp() {
      if (state.activeTab === 'setup') {
        els.viewSetup.classList.remove('hidden');
        els.viewItinerary.classList.add('hidden');
        els.headerTitle.innerText = '行程設定';
        els.headerSubtitle.innerText = state.tripData.title || 'My Trip';
        els.btnSettings.classList.add('hidden');
        
        // Populate Setup Form
        els.setupTitle.value = state.tripData.title;
        els.setupStartDate.value = state.tripData.startDate;
        els.setupDays.value = state.tripData.days;
        els.setupAcc.value = state.tripData.accommodation;
      } else {
        els.viewSetup.classList.add('hidden');
        els.viewItinerary.classList.remove('hidden');
        els.headerTitle.innerText = '行程表';
        els.headerSubtitle.innerText = state.tripData.title;
        els.btnSettings.classList.remove('hidden');
        
        renderDaysTabs();
        renderTimeline();
      }
    }

    function getDayDateString(dayIndex) {
      if (!state.tripData.startDate) return `Day ${dayIndex}`;
      const date = new Date(state.tripData.startDate);
      date.setDate(date.getDate() + dayIndex - 1);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function renderDaysTabs() {
      els.daysTabs.innerHTML = '';
      for (let i = 1; i <= state.tripData.days; i++) {
        const isActive = state.activeDay === i;
        const btn = document.createElement('button');
        btn.className = `snap-start shrink-0 px-5 py-2.5 rounded-full font-bold transition-all duration-200 border ${
          isActive 
            ? 'bg-brand-primary text-brand-card border-brand-primary shadow-md shadow-brand-primary/20' 
            : 'bg-brand-card text-brand-textSub border-brand-light hover:bg-brand-light/50'
        }`;
        btn.innerHTML = `<div class="flex items-center gap-2"><span class="text-xs opacity-80">Day ${i}</span><span class="text-sm">${getDayDateString(i)}</span></div>`;
        btn.onclick = () => { state.activeDay = i; renderDaysTabs(); renderTimeline(); };
        els.daysTabs.appendChild(btn);
      }
    }

    function renderTimeline() {
      const items = state.tripData.itinerary[state.activeDay] || [];
      els.timelineContainer.innerHTML = '';

      if (items.length === 0) {
        els.timelineContainer.innerHTML = `
          <div class="flex flex-col items-center justify-center h-48 mt-12 text-brand-textSub">
            <div class="w-16 h-16 bg-brand-bg border border-brand-light rounded-full flex items-center justify-center mb-4">
              <i class="fa-solid fa-calendar-day text-2xl text-brand-primary"></i>
            </div>
            <p class="font-medium">這一天尚未安排行程</p>
          </div>`;
        return;
      }

      let html = '<div class="relative pl-2 pr-1">';
      items.forEach((item, index) => {
        const isLast = index === items.length - 1;
        
        if (item.type === 'location') {
          html += `
            <div class="relative flex group cursor-pointer" onclick="openOptions('${item.id}')">
              <div class="w-16 shrink-0 pt-0.5 text-right pr-3">
                <span class="text-[16px] font-bold text-brand-dark tracking-tight">${item.time}</span>
              </div>
              <div class="w-6 shrink-0 flex flex-col items-center relative">
                <div class="w-3.5 h-3.5 rounded-full border-[3px] border-brand-primary bg-brand-card z-10 mt-1.5 shadow-sm"></div>
                ${!isLast ? `<div class="absolute top-4 bottom-[-10px] w-1 bg-brand-light"></div>` : ''}
              </div>
              <div class="flex-1 pt-0 pb-6 pl-3 relative">
                <div class="text-xl font-bold text-brand-textMain">${item.name}</div>
                ${item.subtitle ? `<div class="text-sm font-medium text-brand-textSub mt-1">${item.subtitle}</div>` : ''}
                <button class="absolute right-0 top-0 w-8 h-8 flex items-center justify-center text-brand-textSub hover:text-brand-dark rounded-full transition-colors">
                  <i class="fa-solid fa-ellipsis-vertical text-lg"></i>
                </button>
              </div>
            </div>`;
        } else {
          const modeObj = TRANSPORT_MODES.find(m => m.id === item.mode) || TRANSPORT_MODES[0];
          html += `
            <div class="relative flex group cursor-pointer" onclick="openOptions('${item.id}')">
              <div class="w-16 shrink-0 py-4 text-right pr-3 flex flex-col items-end justify-center">
                <span class="text-[13px] font-bold text-brand-textSub leading-tight whitespace-pre-wrap text-right">${item.duration}</span>
                ${item.extraInfo ? `<span class="text-[11px] font-bold text-brand-primary mt-1 flex items-center">${item.extraInfo}<i class="fa-solid fa-caret-down text-[10px] ml-1"></i></span>` : ''}
              </div>
              <div class="w-6 shrink-0 flex flex-col items-center relative">
                <div class="absolute top-[-10px] bottom-[-10px] w-1 bg-brand-light"></div>
              </div>
              <div class="flex-1 py-1.5 pl-3 pr-0">
                <div class="bg-brand-bg border border-brand-light rounded-[16px] p-3 pb-3.5 relative overflow-hidden">
                   <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-brand-primary"></div>
                   <div class="flex justify-between items-start mb-1.5 pl-1.5">
                     <span class="text-[11px] font-bold text-brand-dark flex items-center gap-1.5 bg-brand-card border border-brand-light px-2 py-0.5 rounded-md shadow-sm">
                       <i class="${modeObj.icon}"></i> ${modeObj.label}
                     </span>
                   </div>
                   <div class="text-[15px] font-bold text-brand-textMain leading-snug pl-1.5">${item.name}</div>
                   ${item.cost ? `<div class="text-[13px] font-medium text-brand-textSub mt-2 pl-1.5">費用：${item.cost}</div>` : ''}
                   <button class="absolute right-1 top-1 w-8 h-8 flex items-center justify-center text-brand-textSub hover:text-brand-dark rounded-full">
                     <i class="fa-solid fa-ellipsis-vertical"></i>
                  </button>
                </div>
              </div>
            </div>`;
        }
      });
      html += '</div>';
      els.timelineContainer.innerHTML = html;
    }

    function renderTransportModes() {
      els.transportModesGrid.innerHTML = TRANSPORT_MODES.map(mode => `
        <button type="button" onclick="selectTransportMode('${mode.id}')"
          class="mode-btn py-3 rounded-[12px] flex flex-col items-center gap-1.5 transition-all border ${
            state.formData.mode === mode.id ? 'bg-brand-primary text-brand-card border-brand-primary shadow-sm' : 'bg-brand-card text-brand-textSub border-brand-light'
          }">
          <i class="${mode.icon} text-lg"></i>
          <span class="text-xs font-bold">${mode.label}</span>
        </button>
      `).join('');
    }

    // --- Modal Logic ---
    function openFormModal(type, editingId = null) {
      state.itemType = type;
      state.editingId = editingId;
      
      if (editingId) {
        const item = state.tripData.itinerary[state.activeDay].find(i => i.id === editingId);
        state.formData = { ...item };
        els.formTitle.innerText = '編輯項目';
      } else {
        const now = new Date();
        const timeString = now.toTimeString().slice(0, 5);
        state.formData = { time: timeString, name: '', subtitle: '', mode: 'train', duration: '', extraInfo: '', cost: '' };
        els.formTitle.innerText = type === 'location' ? '新增地點' : '新增交通';
      }

      // Toggle Fields visibility based on type
      if (type === 'location') {
        els.groupMode.classList.add('hidden');
        els.groupSub.classList.remove('hidden');
        els.groupDetails.classList.add('hidden');
        els.groupCost.classList.add('hidden');
        els.labelTime.innerHTML = '時間 <span class="text-brand-primary">*</span>';
        els.labelName.innerHTML = '地點名稱 <span class="text-brand-primary">*</span>';
        els.inputName.placeholder = '例：成田空港';
      } else {
        els.groupMode.classList.remove('hidden');
        els.groupSub.classList.add('hidden');
        els.groupDetails.classList.remove('hidden');
        els.groupCost.classList.remove('hidden');
        els.labelTime.innerHTML = '排序時間 <span class="text-brand-primary">*</span>';
        els.labelName.innerHTML = '路線名稱 <span class="text-brand-primary">*</span>';
        els.inputName.placeholder = '例：Skyliner';
        renderTransportModes();
      }

      // Set Input values
      els.inputTime.value = state.formData.time;
      els.inputName.value = state.formData.name;
      els.inputSubtitle.value = state.formData.subtitle;
      els.inputDuration.value = state.formData.duration;
      els.inputExtra.value = state.formData.extraInfo;
      els.inputCost.value = state.formData.cost;

      validateForm();
      showModal('form');
    }

    // Global function for onclick attributes
    window.openOptions = function(id) {
      state.editingId = id;
      showModal('options');
    };

    window.selectTransportMode = function(id) {
      state.formData.mode = id;
      renderTransportModes();
    };

    function showModal(modalName) {
      els.overlay.classList.remove('closed');
      els.overlay.classList.add('open');
      
      if (modalName === 'form') {
        els.sheetForm.classList.remove('closed');
        els.sheetForm.classList.add('open');
      } else if (modalName === 'options') {
        els.sheetOptions.classList.remove('closed');
        els.sheetOptions.classList.add('open');
      } else if (modalName === 'delete') {
        els.modalDelete.classList.remove('closed');
        els.modalDelete.classList.add('open');
        els.dialogContent.classList.remove('scale-95', 'opacity-0');
        els.dialogContent.classList.add('scale-100', 'opacity-100');
      }
      state.modalMode = modalName;
    }

    function closeAllModals() {
      els.overlay.classList.remove('open');
      els.overlay.classList.add('closed');
      
      els.sheetForm.classList.remove('open');
      els.sheetForm.classList.add('closed');
      
      els.sheetOptions.classList.remove('open');
      els.sheetOptions.classList.add('closed');
      
      els.modalDelete.classList.remove('open');
      els.modalDelete.classList.add('closed');
      els.dialogContent.classList.add('scale-95', 'opacity-0');
      els.dialogContent.classList.remove('scale-100', 'opacity-100');
      
      state.modalMode = null;
    }

    // --- Actions ---
    function validateForm() {
      const isValid = els.inputTime.value.trim() !== '' && els.inputName.value.trim() !== '';
      els.btnSaveItem.disabled = !isValid;
    }

    function handleFormInputs() {
      state.formData.time = els.inputTime.value;
      state.formData.name = els.inputName.value;
      state.formData.subtitle = els.inputSubtitle.value;
      state.formData.duration = els.inputDuration.value;
      state.formData.extraInfo = els.inputExtra.value;
      state.formData.cost = els.inputCost.value;
      validateForm();
    }

    function saveItem() {
      if (!state.formData.time || !state.formData.name) return;
      
      if (!state.tripData.itinerary[state.activeDay]) {
        state.tripData.itinerary[state.activeDay] = [];
      }
      
      const currentItems = state.tripData.itinerary[state.activeDay];
      const newItem = { ...state.formData, type: state.itemType, id: state.editingId || Date.now().toString() };
      
      if (state.editingId) {
        const index = currentItems.findIndex(i => i.id === state.editingId);
        if (index > -1) currentItems[index] = newItem;
      } else {
        currentItems.push(newItem);
      }

      currentItems.sort((a, b) => a.time.localeCompare(b.time));
      saveData();
      closeAllModals();
      renderTimeline();
    }

    function deleteItem() {
      if (!state.editingId) return;
      state.tripData.itinerary[state.activeDay] = state.tripData.itinerary[state.activeDay].filter(i => i.id !== state.editingId);
      saveData();
      closeAllModals();
      renderTimeline();
    }

    // --- Events ---
    function setupEventListeners() {
      // Top Navigation
      els.btnSettings.addEventListener('click', () => {
        state.activeTab = 'setup';
        renderApp();
      });

      // Setup Form Submit
      els.formSetup.addEventListener('submit', (e) => {
        e.preventDefault();
        state.tripData.title = els.setupTitle.value;
        state.tripData.startDate = els.setupStartDate.value;
        state.tripData.days = parseInt(els.setupDays.value) || 1;
        state.tripData.accommodation = els.setupAcc.value;
        state.activeTab = 'itinerary';
        saveData();
        renderApp();
      });

      // Main FABs
      document.getElementById('btn-add-location').addEventListener('click', () => openFormModal('location'));
      document.getElementById('btn-add-transport').addEventListener('click', () => openFormModal('transport'));

      // Modals Close
      document.querySelectorAll('.btn-close-modal').forEach(btn => {
        btn.addEventListener('click', closeAllModals);
      });

      // Form Inputs tracking
      [els.inputTime, els.inputName, els.inputSubtitle, els.inputDuration, els.inputExtra, els.inputCost].forEach(input => {
        input.addEventListener('input', handleFormInputs);
      });

      els.btnSaveItem.addEventListener('click', saveItem);

      // Options Modal Actions
      document.getElementById('btn-option-edit').addEventListener('click', () => {
        closeAllModals();
        setTimeout(() => {
          const item = state.tripData.itinerary[state.activeDay].find(i => i.id === state.editingId);
          if (item) openFormModal(item.type, item.id);
        }, 300); // Wait for transition
      });

      document.getElementById('btn-option-delete').addEventListener('click', () => {
        closeAllModals();
        setTimeout(() => showModal('delete'), 300);
      });

      document.getElementById('btn-confirm-delete').addEventListener('click', deleteItem);
    }

    // Boot App
    init();

  </script>
</body>
</html>
