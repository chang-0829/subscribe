<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的訂閱管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'] },
                    colors: {
                        brand: {
                            primary: '#748CAB',
                            dark: '#3E5C76',
                            light: '#E6EBEF',
                            bg: '#F2F5F8',
                            card: '#FFFFFF',
                            textMain: '#2C3E50',
                            textSub: '#8796A5'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 24px rgba(62, 92, 118, 0.06)',
                        'float': '0 -8px 32px rgba(62, 92, 118, 0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #E2E8F0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #F2F5F8;
        }

        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.2, 1);
        }
        .bottom-sheet.active { transform: translateY(0); }
        .overlay {
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        #iconDropdownGrid {
            overscroll-behavior: contain;
        }
    </style>
</head>
<body class="text-brand-textMain antialiased selection:bg-brand-primary selection:text-white">

    <div class="app-container h-[100dvh] flex flex-col relative overflow-hidden">
        
        <!-- ================= 1. 絕對置頂區域 ================= -->
        <div id="fixedHeader" class="flex-none bg-brand-bg px-5 pt-12 pb-2 z-20 flex flex-col border-b border-transparent">
            <header class="flex justify-between items-center mb-5">
                <h1 class="text-2xl font-bold tracking-wide text-brand-dark" id="pageTitle">我的訂閱</h1>
                <button onclick="openFormModal()" class="w-10 h-10 bg-white rounded-full shadow-sm text-brand-dark flex items-center justify-center hover:bg-brand-light transition-colors active:scale-95 shrink-0">
                    <i class="fa-solid fa-plus text-lg"></i>
                </button>
            </header>

            <div id="homeHeaderContent" class="flex flex-col gap-5">
                <section class="bg-brand-card rounded-[24px] p-6 shadow-soft relative shrink-0">
                    <div class="flex items-center gap-2 mb-2 text-brand-textSub">
                        <i class="fa-solid fa-wallet text-brand-primary"></i>
                        <h2 class="text-sm font-medium">每月平均花費 (TWD)</h2>
                    </div>
                    <div class="flex items-baseline gap-1 mt-1">
                        <span class="text-4xl font-bold tracking-tight text-brand-dark" id="totalAmount">$0</span>
                    </div>
                    <div class="mt-4 pt-4 border-t border-brand-bg flex justify-between items-center">
                        <span class="text-sm font-medium text-brand-textSub bg-brand-light/50 px-3 py-1 rounded-full" id="subCount">共 0 項訂閱</span>
                    </div>
                </section>

                <div class="flex justify-between items-end pb-1 bg-brand-bg">
                    <h3 class="text-lg font-bold text-brand-dark">訂閱明細</h3>
                </div>
            </div>
            
            <div id="settingsHeaderContent" class="hidden pb-2">
                <p class="text-brand-textSub text-sm">自訂你的訂閱選項，這將會出現在新增訂閱的選單中。</p>
            </div>
        </div>

        <!-- ================= 2. 內容滾動區域 ================= -->
        <main id="mainScroll" class="flex-1 overflow-y-auto px-5 pt-2 pb-28 hide-scrollbar scroll-smooth">
            
            <div id="view-home" class="flex flex-col gap-4">
                <div id="subListContainer" class="bg-white rounded-[24px] shadow-soft overflow-hidden hidden mb-6">
                    <div id="subList" class="flex flex-col"></div>
                </div>

                <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-center">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-soft mb-5 text-brand-primary/40">
                        <i class="fa-solid fa-box-open text-4xl"></i>
                    </div>
                    <p class="text-brand-dark font-bold text-lg mb-1">尚未建立任何訂閱</p>
                    <p class="text-sm text-brand-textSub">點擊右上角「+」開始紀錄你的訂閱服務</p>
                </div>
            </div>

            <div id="view-settings" class="hidden flex flex-col gap-8 pb-10 pt-2">
                <div class="bg-white rounded-[24px] shadow-soft overflow-hidden">
                    <div class="px-5 py-4 border-b border-brand-light/60 bg-brand-card flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-brand-primary"></i>
                        <h4 class="font-bold text-brand-dark">分類管理</h4>
                    </div>
                    <ul id="settingsCategoryList" class="flex flex-col"></ul>
                    
                    <div class="px-5 py-4 bg-brand-bg/40 flex gap-3 items-center border-t border-brand-light/40">
                        <input type="text" id="newCategoryInput" placeholder="新增分類 (例如：📱 通訊費)" 
                               class="bg-white border border-brand-light/50 rounded-xl px-4 py-2.5 outline-none flex-1 min-w-0 text-sm font-medium text-brand-dark placeholder:text-brand-textSub/60 focus:border-brand-primary transition-colors">
                        <button onclick="addCategory()" class="bg-brand-dark text-white px-5 py-2.5 rounded-xl text-sm font-bold shrink-0 whitespace-nowrap shadow-sm hover:bg-brand-textMain active:scale-95 transition-all">新增</button>
                    </div>
                </div>

                <div class="bg-white rounded-[24px] shadow-soft overflow-hidden">
                    <div class="px-5 py-4 border-b border-brand-light/60 bg-brand-card flex flex-col gap-1">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-icons text-brand-primary"></i>
                            <h4 class="font-bold text-brand-dark">圖示庫管理</h4>
                        </div>
                    </div>
                    <div class="p-5 bg-white border-b border-brand-light/40">
                        <p class="text-xs text-brand-textSub mb-4">請輸入 FontAwesome 的 Class 名稱</p>
                        <div id="settingsIconList" class="flex flex-wrap gap-4"></div>
                    </div>
                    <div class="px-5 py-4 bg-brand-bg/40 flex gap-3 items-center">
                        <input type="text" id="newIconInput" placeholder="fa-solid fa-star" 
                               class="bg-white border border-brand-light/50 rounded-xl px-4 py-2.5 outline-none flex-1 min-w-0 text-sm font-mono text-brand-dark placeholder:text-brand-textSub/50 focus:border-brand-primary transition-colors">
                        <button onclick="addIcon()" class="bg-brand-dark text-white px-5 py-2.5 rounded-xl text-sm font-bold shrink-0 whitespace-nowrap shadow-sm hover:bg-brand-textMain active:scale-95 transition-all">新增</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- ================= 3. 底部導覽列 ================= -->
        <nav class="flex-none w-full bg-white/95 backdrop-blur-md border-t border-brand-light flex justify-around pt-3 pb-[env(safe-area-inset-bottom,20px)] px-2 z-30 text-[10px] text-brand-textSub">
            <div onclick="switchTab('home')" id="tab-home" class="nav-btn flex flex-col items-center gap-1.5 cursor-pointer text-brand-dark font-medium transition-colors">
                <i class="fa-solid fa-house text-xl"></i>
                <span>總覽</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-brand-light">
                <i class="fa-solid fa-chart-pie text-xl"></i>
                <span>統計</span>
            </div>
            <div onclick="switchTab('settings')" id="tab-settings" class="nav-btn flex flex-col items-center gap-1.5 cursor-pointer hover:text-brand-dark transition-colors">
                <i class="fa-solid fa-bars text-xl" id="tab-settings-icon"></i>
                <span id="tab-settings-text">更多</span>
            </div>
        </nav>

        <!-- ================= 共用 Overlay ================= -->
        <div id="modalOverlay" class="overlay fixed inset-0 bg-brand-textMain/50 z-40 backdrop-blur-[2px]" onclick="closeAllModals()"></div>
        
        <!-- ================= 4. 表單 Modal (新增/編輯) ================= -->
        <div id="formModal" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-[32px] flex flex-col max-h-[90dvh] max-w-[480px] mx-auto shadow-float overflow-hidden">
            
            <div id="formModalHeader" class="flex-none pt-4 pb-4 px-6 bg-white rounded-t-[32px] border-b border-brand-bg relative cursor-grab active:cursor-grabbing touch-none">
                <div class="w-14 h-1.5 bg-brand-light rounded-full mx-auto mb-4 pointer-events-none"></div>
                <button onclick="closeAllModals()" class="absolute right-5 top-5 w-8 h-8 flex items-center justify-center text-brand-textSub hover:text-brand-dark transition-colors bg-brand-bg rounded-full z-10">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <h3 id="formModalTitle" class="text-xl font-bold text-center text-brand-dark relative pointer-events-none">新增訂閱</h3>
            </div>
            
            <div class="flex-1 overflow-y-auto hide-scrollbar bg-white">
                <form id="saveForm" onsubmit="handleSave(event)" class="px-6 py-6 flex flex-col gap-6">
                    <input type="hidden" id="editId" value="">
                    
                    <div class="relative">
                        <label class="block text-sm font-medium text-brand-textSub mb-1.5">服務名稱</label>
                        <div class="flex gap-3 relative z-10">
                            <button type="button" onclick="toggleIconDropdown()" class="w-[52px] h-[52px] shrink-0 bg-brand-bg text-brand-primary rounded-[16px] flex items-center justify-center text-2xl transition-colors hover:bg-brand-light border border-brand-light">
                                <i id="currentIconDisplay" class="fa-brands fa-youtube"></i>
                            </button>
                            <input type="text" id="subName" required placeholder="例如：Netflix" 
                                   class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all placeholder:text-brand-textSub/50 font-bold text-lg text-brand-dark">
                        </div>
                        
                        <div id="iconDropdown" class="hidden absolute top-full left-0 w-full mt-2 bg-white border border-brand-light rounded-[16px] p-3 shadow-header z-30">
                            <p class="text-xs text-brand-textSub mb-2 font-medium">選擇圖示：</p>
                            <div class="grid grid-cols-6 gap-2 max-h-[150px] overflow-y-auto hide-scrollbar" id="iconDropdownGrid"></div>
                        </div>
                        <input type="hidden" id="subIcon" value="fa-brands fa-youtube">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-brand-textSub mb-1.5">扣款週期</label>
                            <select id="subCycle" onchange="toggleDateInput()" required class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all text-brand-dark font-bold appearance-none">
                                <option value="monthly">每月</option>
                                <option value="yearly">每年</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-brand-textSub mb-1.5">金額 (TWD)</label>
                            <input type="number" id="subPrice" required min="0" placeholder="390" 
                                   class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all placeholder:text-brand-textSub/50 font-bold text-lg text-brand-dark">
                        </div>
                    </div>

                    <div id="dateInputContainer">
                        <label class="block text-sm font-medium text-brand-textSub mb-1.5">扣款日期</label>
                        <div id="monthlyDateGroup" class="flex items-center bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus-within:border-brand-primary focus-within:bg-white transition-all">
                            <span class="text-brand-textSub mr-2 whitespace-nowrap text-sm font-medium">每月</span>
                            <input type="number" id="subDateDay" required min="1" max="31" placeholder="15" 
                                   class="bg-transparent border-none outline-none w-full min-w-0 text-center font-bold text-lg p-0 text-brand-dark placeholder:text-brand-textSub/50">
                            <span class="text-brand-textSub ml-2 whitespace-nowrap text-sm font-medium">日</span>
                        </div>
                        
                        <div id="yearlyDateGroup" class="hidden items-center bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus-within:border-brand-primary focus-within:bg-white transition-all gap-2">
                            <span class="text-brand-textSub whitespace-nowrap text-sm font-medium shrink-0">每年</span>
                            <input type="number" id="subDateMonthYearly" min="1" max="12" placeholder="12" 
                                   class="bg-transparent border-none outline-none w-1/2 min-w-0 text-center font-bold text-lg p-0 text-brand-dark placeholder:text-brand-textSub/50 border-b border-brand-light rounded-none">
                            <span class="text-brand-textSub whitespace-nowrap text-sm font-medium shrink-0">月</span>
                            <input type="number" id="subDateDayYearly" min="1" max="31" placeholder="25" 
                                   class="bg-transparent border-none outline-none w-1/2 min-w-0 text-center font-bold text-lg p-0 text-brand-dark placeholder:text-brand-textSub/50 border-b border-brand-light rounded-none">
                            <span class="text-brand-textSub whitespace-nowrap text-sm font-medium shrink-0">日</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-brand-textSub mb-1.5">分類</label>
                        <select id="subCategory" required class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all text-brand-dark font-bold appearance-none"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-brand-textSub mb-1.5">訂閱管道</label>
                        <select id="subChannel" required class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all text-brand-dark font-bold appearance-none">
                            <option value="官方網站">官方網站</option>
                            <option value="App Store">App Store (Apple)</option>
                            <option value="Google Play">Google Play</option>
                            <option value="第三方代購">第三方代購</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-brand-textSub mb-1.5">扣款管道 (選填)</label>
                        <input type="text" id="subPayment" placeholder="例如：台新 @GoGo卡" 
                               class="w-full bg-brand-bg border border-transparent rounded-[16px] px-4 py-3 focus:border-brand-primary focus:bg-white outline-none transition-all placeholder:text-brand-textSub/50 font-bold text-brand-dark">
                    </div>
                </form>
            </div>
            
            <!-- 表單 Modal 固定底部按鈕 -->
            <div class="flex-none px-6 pt-3 pb-[env(safe-area-inset-bottom,32px)] bg-white border-t border-brand-bg">
                <button type="button" onclick="document.getElementById('saveForm').requestSubmit()" class="w-full bg-brand-dark text-white rounded-[16px] py-4 font-bold text-lg hover:bg-brand-textMain active:scale-[0.98] transition-transform shadow-md">
                    確認儲存
                </button>
            </div>
        </div>

        <!-- ================= 5. 訂閱詳細資訊 Modal (結構完全對標新增表單) ================= -->
        <div id="detailModal" class="bottom-sheet fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-[32px] flex flex-col max-h-[90dvh] max-w-[480px] mx-auto shadow-float overflow-hidden">
            
            <!-- 詳細資訊 Header (與新增表單一模一樣) -->
            <div id="detailModalHeader" class="flex-none pt-4 pb-4 px-6 bg-white rounded-t-[32px] border-b border-brand-bg relative cursor-grab active:cursor-grabbing touch-none">
                <div class="w-14 h-1.5 bg-brand-light rounded-full mx-auto mb-4 pointer-events-none"></div>
                <button onclick="closeAllModals()" class="absolute right-5 top-5 w-8 h-8 flex items-center justify-center text-brand-textSub hover:text-brand-dark transition-colors bg-brand-bg rounded-full z-10">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <h3 class="text-xl font-bold text-center text-brand-dark pointer-events-none">訂閱詳細資訊</h3>
            </div>
            
            <!-- 詳細資訊 內容捲動區 (背景為白) -->
            <div class="flex-1 overflow-y-auto hide-scrollbar bg-white">
                <div class="px-6 py-6 flex flex-col">
                    <div class="flex flex-col items-center mb-8">
                        <div class="w-20 h-20 rounded-[24px] bg-brand-bg text-brand-primary flex items-center justify-center text-4xl mb-4 shadow-sm border border-brand-light/50">
                            <i id="detailIcon" class=""></i>
                        </div>
                        <h2 id="detailName" class="text-2xl font-bold text-brand-dark mb-1"></h2>
                        <div class="text-center text-brand-primary font-bold text-3xl" id="detailPrice"></div>
                        <span id="detailCycleBadge" class="mt-2 text-xs font-bold px-2 py-1 rounded bg-brand-light text-brand-dark"></span>
                    </div>

                    <div class="bg-brand-bg rounded-[20px] p-5 flex flex-col gap-4 border border-brand-light/30">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-brand-textSub">扣款日期</span>
                            <span class="text-[15px] font-bold text-brand-dark" id="detailDate"></span>
                        </div>
                        <div class="w-full h-px bg-brand-light/50"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-brand-textSub">分類</span>
                            <span class="text-[15px] font-bold text-brand-dark bg-white px-2 py-0.5 rounded-md" id="detailCategory"></span>
                        </div>
                        <div class="w-full h-px bg-brand-light/50"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-brand-textSub">訂閱管道</span>
                            <span class="text-[15px] font-bold text-brand-dark" id="detailChannel"></span>
                        </div>
                        <div class="w-full h-px bg-brand-light/50"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-medium text-brand-textSub">扣款方式</span>
                            <span class="text-[15px] font-bold text-brand-dark" id="detailPayment"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 詳細資訊 固定底部按鈕 (與新增表單位置對齊) -->
            <div class="flex-none px-6 pt-3 pb-[env(safe-area-inset-bottom,32px)] bg-white border-t border-brand-bg flex gap-3">
                <button onclick="triggerDeleteFromDetail()" class="w-[64px] shrink-0 bg-red-50 text-red-500 border border-red-100 rounded-[16px] py-4 flex justify-center items-center font-bold text-lg hover:bg-red-500 hover:text-white transition-all shadow-sm">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button onclick="openEditForm()" class="flex-1 bg-brand-dark text-white rounded-[16px] py-4 font-bold text-lg hover:bg-brand-textMain active:scale-[0.98] transition-transform shadow-md flex justify-center items-center">
                    <i class="fa-solid fa-pen mr-2"></i>編輯此訂閱
                </button>
            </div>
        </div>

        <div id="deleteModal" class="overlay fixed inset-0 bg-brand-textMain/60 z-[60] flex items-center justify-center p-4 backdrop-blur-[2px] hidden">
            <div class="bg-white rounded-[24px] p-6 w-full max-w-[320px] scale-95 opacity-0 transition-all shadow-float" id="deleteModalContent">
                <div class="w-14 h-14 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-4 text-2xl mx-auto">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 class="font-bold text-xl mb-2 text-center text-brand-dark">確定要刪除嗎？</h3>
                <p class="text-brand-textSub text-sm mb-6 text-center">刪除後將無法恢復此訂閱紀錄。</p>
                <div class="flex gap-3">
                    <button onclick="closeDeleteModal()" class="flex-1 py-3.5 rounded-[14px] bg-brand-bg text-brand-textMain font-bold hover:bg-brand-light transition-colors">取消</button>
                    <button onclick="confirmDelete()" class="flex-1 py-3.5 rounded-[14px] bg-red-500 text-white font-bold hover:bg-red-600 transition-colors shadow-md shadow-red-500/20">確認刪除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let subscriptions = JSON.parse(localStorage.getItem('my_subscriptions')) || [];
        let defaultCategories = ['🍿 影音娛樂', '💼 生產力工具', '🎮 遊戲', '☁️ 雲端空間', '✨ 生活綜合'];
        let categories = JSON.parse(localStorage.getItem('my_categories')) || defaultCategories;
        let defaultIcons = ['fa-brands fa-youtube', 'fa-brands fa-spotify', 'fa-brands fa-apple', 'fa-solid fa-film', 'fa-solid fa-gamepad', 'fa-solid fa-cloud', 'fa-solid fa-dumbbell', 'fa-solid fa-music', 'fa-solid fa-tv', 'fa-solid fa-mobile-screen', 'fa-solid fa-cart-shopping'];
        let availableIcons = JSON.parse(localStorage.getItem('my_icons')) || defaultIcons;
        
        let currentDetailId = null;

        const formatMoney = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(num);

        function switchTab(tab) {
            const viewHome = document.getElementById('view-home');
            const viewSettings = document.getElementById('view-settings');
            const homeHeader = document.getElementById('homeHeaderContent');
            const settingsHeader = document.getElementById('settingsHeaderContent');
            const pageTitle = document.getElementById('pageTitle');
            const mainScroll = document.getElementById('mainScroll');
            
            mainScroll.scrollTop = 0;
            
            document.getElementById('tab-home').classList.remove('text-brand-dark');
            document.getElementById('tab-home').classList.add('text-brand-textSub');
            document.getElementById('tab-settings-icon').classList.remove('text-brand-dark');
            document.getElementById('tab-settings-text').classList.remove('text-brand-dark');

            if (tab === 'home') {
                viewHome.classList.remove('hidden');
                viewSettings.classList.add('hidden');
                homeHeader.classList.remove('hidden');
                settingsHeader.classList.add('hidden');
                pageTitle.innerText = "我的訂閱";
                document.getElementById('tab-home').classList.add('text-brand-dark');
                document.getElementById('tab-home').classList.remove('text-brand-textSub');
                renderApp();
            } else if (tab === 'settings') {
                viewHome.classList.add('hidden');
                viewSettings.classList.remove('hidden');
                homeHeader.classList.add('hidden');
                settingsHeader.classList.remove('hidden');
                pageTitle.innerText = "設定與管理";
                document.getElementById('tab-settings-icon').classList.add('text-brand-dark');
                document.getElementById('tab-settings-text').classList.add('text-brand-dark');
                renderSettings();
            }
        }

        function toggleDateInput() {
            const cycle = document.getElementById('subCycle').value;
            const monthlyGroup = document.getElementById('monthlyDateGroup');
            const yearlyGroup = document.getElementById('yearlyDateGroup');
            const subDateDay = document.getElementById('subDateDay');
            const subDateMonthYearly = document.getElementById('subDateMonthYearly');
            const subDateDayYearly = document.getElementById('subDateDayYearly');

            if (cycle === 'yearly') {
                monthlyGroup.classList.add('hidden');
                monthlyGroup.classList.remove('flex');
                yearlyGroup.classList.add('flex');
                yearlyGroup.classList.remove('hidden');
                
                subDateDay.removeAttribute('required');
                subDateMonthYearly.setAttribute('required', 'required');
                subDateDayYearly.setAttribute('required', 'required');
            } else {
                yearlyGroup.classList.add('hidden');
                yearlyGroup.classList.remove('flex');
                monthlyGroup.classList.add('flex');
                monthlyGroup.classList.remove('hidden');

                subDateMonthYearly.removeAttribute('required');
                subDateDayYearly.removeAttribute('required');
                subDateDay.setAttribute('required', 'required');
            }
        }

        function toggleIconDropdown() {
            const dropdown = document.getElementById('iconDropdown');
            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                renderIconDropdown();
            } else {
                dropdown.classList.add('hidden');
            }
        }

        function renderIconDropdown() {
            const grid = document.getElementById('iconDropdownGrid');
            grid.innerHTML = '';
            availableIcons.forEach(iconClass => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = "w-10 h-10 rounded-[12px] bg-brand-bg flex items-center justify-center text-brand-dark hover:bg-brand-primary hover:text-white transition-colors text-lg";
                btn.innerHTML = `<i class="${iconClass}"></i>`;
                btn.onclick = () => {
                    document.getElementById('currentIconDisplay').className = iconClass;
                    document.getElementById('subIcon').value = iconClass;
                    document.getElementById('iconDropdown').classList.add('hidden');
                };
                grid.appendChild(btn);
            });
        }

        function renderSettings() {
            const catList = document.getElementById('settingsCategoryList');
            catList.innerHTML = '';
            categories.forEach((cat, index) => {
                catList.innerHTML += `
                    <li class="flex justify-between items-center px-5 py-3.5 border-b border-brand-light/40 last:border-0 bg-white">
                        <span class="text-brand-textMain font-bold text-[15px]">${cat}</span>
                        <button onclick="removeCategory(${index})" class="text-brand-textSub/40 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                    </li>
                `;
            });

            const iconList = document.getElementById('settingsIconList');
            iconList.innerHTML = '';
            availableIcons.forEach((iconClass, index) => {
                iconList.innerHTML += `
                    <div class="relative w-12 h-12 bg-brand-bg rounded-[14px] flex items-center justify-center text-brand-dark text-xl shrink-0 border border-brand-light/30">
                        <i class="${iconClass}"></i>
                        <button onclick="removeIcon(${index})" class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 shadow-md text-white rounded-full text-[10px] flex items-center justify-center transition-transform hover:scale-110 active:scale-95"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `;
            });
        }

        function addCategory() {
            const input = document.getElementById('newCategoryInput');
            const val = input.value.trim();
            if (val && !categories.includes(val)) {
                categories.push(val);
                localStorage.setItem('my_categories', JSON.stringify(categories));
                input.value = '';
                renderSettings();
                renderCategorySelect();
            }
        }

        function removeCategory(index) {
            if (categories.length <= 1) return alert('至少需保留一個分類');
            categories.splice(index, 1);
            localStorage.setItem('my_categories', JSON.stringify(categories));
            renderSettings();
            renderCategorySelect();
        }

        function addIcon() {
            const input = document.getElementById('newIconInput');
            const val = input.value.trim();
            if (val && !availableIcons.includes(val)) {
                availableIcons.push(val);
                localStorage.setItem('my_icons', JSON.stringify(availableIcons));
                input.value = '';
                renderSettings();
            }
        }

        function removeIcon(index) {
            if (availableIcons.length <= 1) return alert('至少需保留一個圖示');
            availableIcons.splice(index, 1);
            localStorage.setItem('my_icons', JSON.stringify(availableIcons));
            renderSettings();
        }

        function renderCategorySelect() {
            const select = document.getElementById('subCategory');
            select.innerHTML = '';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.innerText = cat;
                select.appendChild(option);
            });
        }

        function renderApp() {
            const listEl = document.getElementById('subList');
            const listContainer = document.getElementById('subListContainer');
            const emptyEl = document.getElementById('emptyState');
            const totalEl = document.getElementById('totalAmount');
            const countEl = document.getElementById('subCount');

            const monthlyTotal = subscriptions.reduce((sum, sub) => {
                let costPerMonth = sub.price;
                if (sub.cycle === 'yearly') costPerMonth = sub.price / 12;
                return sum + costPerMonth;
            }, 0);
            
            totalEl.innerText = formatMoney(Math.round(monthlyTotal));
            countEl.innerText = `${subscriptions.length} 項訂閱`;

            localStorage.setItem('my_subscriptions', JSON.stringify(subscriptions));
            renderCategorySelect();
            listEl.innerHTML = '';

            if (subscriptions.length === 0) {
                listContainer.classList.add('hidden');
                emptyEl.style.display = 'flex';
            } else {
                listContainer.classList.remove('hidden');
                emptyEl.style.display = 'none';
                
                subscriptions.sort((a, b) => {
                    let dateA = a.cycle === 'yearly' ? parseInt(a.date.split('/')[0]) * 100 + parseInt(a.date.split('/')[1]) : parseInt(a.date);
                    let dateB = b.cycle === 'yearly' ? parseInt(b.date.split('/')[0]) * 100 + parseInt(b.date.split('/')[1]) : parseInt(b.date);
                    return dateA - dateB;
                }).forEach(sub => {
                    const item = document.createElement('div');
                    item.className = "px-5 py-4 border-b border-brand-light/60 last:border-b-0 flex justify-between items-center cursor-pointer hover:bg-brand-bg/60 active:bg-brand-bg transition-colors";
                    item.onclick = () => openDetailModal(sub.id);

                    const paymentText = sub.payment ? sub.payment : '未設定扣款';
                    const dateDisplay = sub.cycle === 'yearly' ? `每年 ${sub.date} 扣款` : `每月 ${sub.date} 日扣款`;
                    const cycleBadge = sub.cycle === 'yearly' ? '<span class="ml-2 text-[10px] bg-brand-primary text-white px-1.5 py-0.5 rounded">年付</span>' : '';

                    item.innerHTML = `
                        <div class="flex-1">
                            <div class="text-[13px] font-bold text-brand-dark mb-1 tracking-wide">${dateDisplay}</div>
                            <div class="text-[15px] text-brand-textMain mb-1 flex items-center font-medium">
                                <i class="${sub.icon} text-brand-primary w-[22px] text-center mr-1"></i>
                                ${sub.name} ${cycleBadge}
                            </div>
                            <div class="text-xs text-brand-textSub">扣款: ${paymentText}</div>
                        </div>
                        <div class="text-right flex flex-col items-end justify-center min-w-[120px]">
                            <div class="flex items-center mb-1">
                                <span class="text-xs text-brand-textSub mr-1.5 font-bold">TWD</span>
                                <span class="text-lg font-bold text-brand-dark leading-none">${sub.price}</span>
                                <i class="fa-solid fa-chevron-right text-brand-textSub text-[13px] ml-2"></i>
                            </div>
                            <div class="text-[13px] text-brand-textMain mb-1 font-medium">${sub.category}</div>
                            <div class="text-xs text-brand-textSub">${sub.channel}</div>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            }
        }

        function handleSave(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const name = document.getElementById('subName').value;
            const price = document.getElementById('subPrice').value;
            const cycle = document.getElementById('subCycle').value;
            const category = document.getElementById('subCategory').value;
            const channel = document.getElementById('subChannel').value;
            const payment = document.getElementById('subPayment').value;
            const icon = document.getElementById('subIcon').value;

            let date = '';
            if (cycle === 'yearly') {
                const month = document.getElementById('subDateMonthYearly').value;
                const day = document.getElementById('subDateDayYearly').value;
                if (!month || !day) return; 
                date = `${month}/${day}`;
            } else {
                date = document.getElementById('subDateDay').value;
                if (!date) return;
            }

            if (name && price && date) {
                const subData = {
                    id: editId ? editId : Date.now().toString(), 
                    name: name, price: Number(price), cycle: cycle, date: date, 
                    category: category, channel: channel, payment: payment, icon: icon
                };

                if (editId) {
                    const index = subscriptions.findIndex(s => s.id === editId);
                    if (index !== -1) subscriptions[index] = subData;
                } else {
                    subscriptions.push(subData);
                }

                renderApp();
                closeAllModals();
            }
        }

        const overlay = document.getElementById('modalOverlay');
        const formModal = document.getElementById('formModal');
        const detailModal = document.getElementById('detailModal');
        const deleteModal = document.getElementById('deleteModal');
        const deleteModalContent = document.getElementById('deleteModalContent');
        const mainScroll = document.getElementById('mainScroll');

        function openFormModal(isEdit = false) {
            document.getElementById('iconDropdown').classList.add('hidden');
            formModal.classList.add('active');
            overlay.classList.add('active');
            
            mainScroll.style.overflowY = 'hidden';
            
            if(!isEdit) {
                document.getElementById('saveForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('formModalTitle').innerText = '新增訂閱';
                
                const currentIcon = availableIcons[0];
                document.getElementById('currentIconDisplay').className = currentIcon;
                document.getElementById('subIcon').value = currentIcon;
                if(categories.length > 0) document.getElementById('subCategory').value = categories[0];
                
                document.getElementById('subCycle').value = 'monthly';
                toggleDateInput();
            }
        }

        function openEditForm() {
            const sub = subscriptions.find(s => s.id === currentDetailId);
            if(!sub) return;

            detailModal.classList.remove('active');
            
            document.getElementById('editId').value = sub.id;
            document.getElementById('formModalTitle').innerText = '編輯訂閱';
            document.getElementById('subName').value = sub.name;
            document.getElementById('subPrice').value = sub.price;
            document.getElementById('subCategory').value = sub.category;
            document.getElementById('subChannel').value = sub.channel;
            document.getElementById('subPayment').value = sub.payment || '';
            document.getElementById('subIcon').value = sub.icon;
            document.getElementById('currentIconDisplay').className = sub.icon;
            
            document.getElementById('subCycle').value = sub.cycle || 'monthly';
            toggleDateInput();
            
            if (sub.cycle === 'yearly') {
                const parts = sub.date.split('/');
                document.getElementById('subDateMonthYearly').value = parts[0];
                document.getElementById('subDateDayYearly').value = parts[1];
            } else {
                document.getElementById('subDateDay').value = sub.date;
            }

            setTimeout(() => { formModal.classList.add('active'); }, 100);
        }

        function openDetailModal(id) {
            const sub = subscriptions.find(s => s.id === id);
            if(!sub) return;

            currentDetailId = id;
            document.getElementById('detailIcon').className = sub.icon;
            document.getElementById('detailName').innerText = sub.name;
            document.getElementById('detailPrice').innerText = formatMoney(sub.price);
            
            const isYearly = sub.cycle === 'yearly';
            document.getElementById('detailDate').innerText = isYearly ? `每年 ${sub.date}` : `每月 ${sub.date} 日`;
            
            const badge = document.getElementById('detailCycleBadge');
            if (isYearly) {
                badge.innerText = '年繳專案';
                badge.className = 'mt-2 text-xs font-bold px-2.5 py-1 rounded-md bg-brand-primary text-white';
            } else {
                badge.innerText = '月繳專案';
                badge.className = 'mt-2 text-xs font-bold px-2.5 py-1 rounded-md bg-brand-light text-brand-dark';
            }

            document.getElementById('detailCategory').innerText = sub.category;
            document.getElementById('detailChannel').innerText = sub.channel;
            document.getElementById('detailPayment').innerText = sub.payment || '尚未設定';

            mainScroll.style.overflowY = 'hidden';

            detailModal.classList.add('active');
            overlay.classList.add('active');
        }

        function closeAllModals() {
            formModal.classList.remove('active');
            detailModal.classList.remove('active');
            overlay.classList.remove('active');
            document.getElementById('iconDropdown').classList.add('hidden');
            currentDetailId = null;

            setTimeout(() => {
                mainScroll.style.overflowY = 'auto';
                formModal.style.transform = '';
                detailModal.style.transform = '';
            }, 300);
        }

        function triggerDeleteFromDetail() {
            deleteModal.classList.remove('hidden');
            setTimeout(() => { deleteModalContent.classList.remove('scale-95', 'opacity-0'); }, 10);
        }

        function closeDeleteModal() {
            deleteModalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { deleteModal.classList.add('hidden'); }, 200);
        }

        function confirmDelete() {
            if(currentDetailId) {
                subscriptions = subscriptions.filter(sub => sub.id !== currentDetailId);
                renderApp();
                closeDeleteModal();
                closeAllModals();
            }
        }

        document.getElementById('saveForm').addEventListener('click', (e) => {
            if (!e.target.closest('#iconDropdown') && !e.target.closest('button[onclick="toggleIconDropdown()"]')) {
                document.getElementById('iconDropdown').classList.add('hidden');
            }
        });

        function setupSmoothDragToClose(modalElement, headerElement) {
            let startY = 0;
            let currentY = 0;
            let isDragging = false;
            let velocity = 0;
            let lastY = 0;
            let lastTime = 0;
            let animationFrameId = null;

            headerElement.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                lastY = startY;
                lastTime = Date.now();
                isDragging = true;
                
                modalElement.style.transition = 'none'; 
                modalElement.style.willChange = 'transform';
                
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            }, { passive: true });

            headerElement.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentY = e.touches[0].clientY;
                const deltaY = currentY - startY;
                
                const now = Date.now();
                const timeDelta = now - lastTime;
                if (timeDelta > 0) {
                    velocity = (currentY - lastY) / timeDelta;
                }
                lastY = currentY;
                lastTime = now;
                
                if (deltaY > 0) {
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = requestAnimationFrame(() => {
                        modalElement.style.transform = `translateY(${deltaY}px)`;
                    });
                    
                    if(e.cancelable) e.preventDefault();
                }
            }, { passive: false });

            const handleEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                
                modalElement.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.9, 0.2, 1)';
                modalElement.style.willChange = 'auto';

                const deltaY = currentY - startY;
                
                if (deltaY > 100 || velocity > 0.6) {
                    closeAllModals();
                } else {
                    modalElement.style.transform = '';
                }
                velocity = 0;
            };

            headerElement.addEventListener('touchend', handleEnd);
            headerElement.addEventListener('touchcancel', handleEnd);
        }

        setupSmoothDragToClose(formModal, document.getElementById('formModalHeader'));
        setupSmoothDragToClose(detailModal, document.getElementById('detailModalHeader'));

        renderApp();
    </script>
</body>
</html>
